<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.emoji {
      font-size: 1.8rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:active {
      transform: scale(0.97);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .stats .done-count {
      color: #48bb78;
      font-weight: 600;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #f7fafc;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      transition: background 0.2s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li.checked {
      background: #f0fff4;
      border-color: #c6f6d5;
      opacity: 0.75;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      transition: color 0.2s;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: #cbd5e0;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    li .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .empty .empty-icon {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      color: #a0aec0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: #e53e3e;
      color: #e53e3e;
      background: #fff5f5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="emoji">🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input
        type="text"
        id="itemInput"
        placeholder="아이템을 입력하세요..."
        autocomplete="off"
      />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats">
      <span id="totalCount">총 0개</span>
      <span class="done-count" id="doneCount">완료 0개</span>
    </div>

    <ul id="list"></ul>

    <div class="empty" id="emptyMsg">
      <div class="empty-icon">🧺</div>
      <div>아직 아이템이 없어요.<br/>위에서 추가해보세요!</div>
    </div>

    <button class="clear-btn" id="clearBtn" style="display:none" onclick="clearDone()">
      완료 항목 모두 삭제
    </button>
  </div>

  <script>
    const input   = document.getElementById('itemInput');
    const list    = document.getElementById('list');
    const empty   = document.getElementById('emptyMsg');
    const clearBtn = document.getElementById('clearBtn');
    const totalCountEl = document.getElementById('totalCount');
    const doneCountEl  = document.getElementById('doneCount');

    let items = JSON.parse(localStorage.getItem('shopping') || '[]');

    function render() {
      list.innerHTML = '';

      items.forEach((item, i) => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('checked');

        li.innerHTML = `
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${i})" />
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="remove(${i})" title="삭제">✕</button>
        `;
        list.appendChild(li);
      });

      const total = items.length;
      const done  = items.filter(it => it.done).length;

      empty.style.display   = total === 0 ? 'block' : 'none';
      clearBtn.style.display = done > 0   ? 'block' : 'none';
      totalCountEl.textContent = `총 ${total}개`;
      doneCountEl.textContent  = `완료 ${done}개`;

      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      items.unshift({ text, done: false });
      input.value = '';
      input.focus();
      render();
    }

    function toggle(i) {
      items[i].done = !items[i].done;
      render();
    }

    function remove(i) {
      items.splice(i, 1);
      render();
    }

    function clearDone() {
      items = items.filter(it => !it.done);
      render();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
